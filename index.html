<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>名畫嘴巴合成器 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: white;
    overflow: hidden;
  }
  h1 {
    padding: 12px;
    font-size: 1.2rem;
    text-align: center;
    color: #e94560;
  }
  #main-canvas {
    max-width: 100vw;
    max-height: 70vh;
    border: 2px solid #e94560;
    border-radius: 8px;
  }
  #controls {
    display: flex;
    gap: 12px;
    padding: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #e94560;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.2s;
  }
  button:active { background: #c73652; }
  #painting-name {
    font-size: 1.1rem;
    padding: 4px 12px;
    text-align: center;
    color: #ffd460;
  }
  #status {
    font-size: 0.85rem;
    color: #aaa;
    padding: 4px 12px;
    text-align: center;
  }
  #video-hidden { display: none; }
</style>
</head>
<body>

<h1>🎨 名畫嘴巴合成器</h1>
<div id="painting-name">蒙娜麗莎</div>
<canvas id="main-canvas"></canvas>
<div id="status">🔄 載入中...</div>

<div id="controls">
  <button onclick="prevPainting()">⬅️ 上一張</button>
  <button onclick="nextPainting()">下一張 ➡️</button>
  <button onclick="saveScreenshot()">📸 截圖</button>
</div>

<video id="video-hidden" autoplay playsinline muted></video>

<script>
// ── 名畫設定（嘴巴位置需根據圖片手動調整）──
const PAINTINGS = [
  {
    name: "蒙娜麗莎",
    file: "paintings/mona_lisa.jpg",
    // mouth 位置 (x, y, w, h) 以名畫原始尺寸為基準
    // mona_lisa.jpg: 800x1192
    mouth: { x: 265, y: 700, w: 200, h: 75 }
  },
  {
    name: "戴珍珠耳環的少女",
    file: "paintings/girl_pearl.jpg",
    // girl_pearl.jpg: 800x947
    mouth: { x: 310, y: 620, w: 190, h: 70 }
  }
];

let currentIdx = 0;
let paintingImgs = [];
let videoEl = document.getElementById('video-hidden');
let canvas = document.getElementById('main-canvas');
let ctx = canvas.getContext('2d');
let faceApiLoaded = false;
let animFrame = null;

// ── 載入 face-api.js（用 CDN）──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    let s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function init() {
  setStatus("📦 載入人臉偵測模型...");
  
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js');
    
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights')
    ]);
    
    faceApiLoaded = true;
    setStatus("✅ 模型載入完成");
  } catch(e) {
    setStatus("⚠️ 模型載入失敗，使用簡化模式");
    console.error(e);
  }
  
  // 載入名畫
  setStatus("🎨 載入名畫...");
  for (let p of PAINTINGS) {
    let img = new Image();
    img.crossOrigin = "anonymous";
    await new Promise((res, rej) => {
      img.onload = res;
      img.onerror = rej;
      img.src = p.file;
    });
    paintingImgs.push(img);
  }
  
  setStatus("📷 請允許相機存取...");
  
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: 640, height: 480 } 
    });
    videoEl.srcObject = stream;
    await new Promise(r => videoEl.onloadedmetadata = r);
    videoEl.play();
    setStatus("😊 把臉對準鏡頭！N = 換名畫");
    startLoop();
  } catch(e) {
    setStatus("❌ 無法存取相機：" + e.message);
  }
}

// ── 主迴圈 ──
let lastFaceLandmarks = null;
let frameCount = 0;

async function startLoop() {
  const loop = async () => {
    drawFrame();
    
    // 每 4 幀偵測一次臉（省效能）
    if (frameCount % 4 === 0 && faceApiLoaded) {
      try {
        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 });
        const result = await faceapi.detectSingleFace(videoEl, options).withFaceLandmarks(true);
        if (result) {
          lastFaceLandmarks = result.landmarks;
        }
      } catch(e) {}
    }
    
    frameCount++;
    animFrame = requestAnimationFrame(loop);
  };
  loop();
}

function drawFrame() {
  const painting = PAINTINGS[currentIdx];
  const paintImg = paintingImgs[currentIdx];
  if (!paintImg) return;
  
  // 設定 canvas 大小
  const maxH = Math.min(window.innerHeight * 0.65, 600);
  const scale = maxH / paintImg.height;
  canvas.width = paintImg.width * scale;
  canvas.height = paintImg.height * scale;
  
  // 畫名畫
  ctx.drawImage(paintImg, 0, 0, canvas.width, canvas.height);
  
  // 如果有偵測到嘴巴，貼上
  if (lastFaceLandmarks && videoEl.readyState >= 2) {
    const mouthPts = lastFaceLandmarks.getMouth();
    
    // 計算嘴巴在 video 中的位置
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let pt of mouthPts) {
      minX = Math.min(minX, pt.x);
      maxX = Math.max(maxX, pt.x);
      minY = Math.min(minY, pt.y);
      maxY = Math.max(maxY, pt.y);
    }
    
    // 加 padding
    const padX = (maxX - minX) * 0.25;
    const padY = (maxY - minY) * 0.35;
    const sx = Math.max(0, minX - padX);
    const sy = Math.max(0, minY - padY);
    const sw = Math.min(vw - sx, (maxX - minX) + padX * 2);
    const sh = Math.min(vh - sy, (maxY - minY) + padY * 2);
    
    // 名畫目標嘴巴位置（scaled）
    const m = painting.mouth;
    const tx = m.x * scale;
    const ty = m.y * scale;
    const tw = m.w * scale;
    const th = m.h * scale;
    
    // 用 offscreen canvas 做嘴巴裁切
    const offCanvas = document.createElement('canvas');
    offCanvas.width = sw;
    offCanvas.height = sh;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(videoEl, sx, sy, sw, sh, 0, 0, sw, sh);
    
    // 羽化貼上
    ctx.save();
    // 建立橢圓形 clip
    ctx.beginPath();
    ctx.ellipse(tx + tw/2, ty + th/2, tw/2 * 1.1, th/2 * 1.2, 0, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(offCanvas, tx - tw*0.05, ty - th*0.1, tw*1.1, th*1.2);
    ctx.restore();
  }
}

function nextPainting() {
  currentIdx = (currentIdx + 1) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
}

function prevPainting() {
  currentIdx = (currentIdx - 1 + PAINTINGS.length) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
}

function saveScreenshot() {
  const link = document.createElement('a');
  link.download = `facemash_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// 鍵盤快捷鍵
document.addEventListener('keydown', e => {
  if (e.key === 'n' || e.key === 'N') nextPainting();
  if (e.key === 'p' || e.key === 'P') prevPainting();
  if (e.key === 's' || e.key === 'S') saveScreenshot();
});

init();
</script>
</body>
</html>
