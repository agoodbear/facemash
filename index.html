<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>名畫嘴巴合成器 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: white;
    overflow: hidden;
  }
  h1 {
    padding: 12px;
    font-size: 1.2rem;
    text-align: center;
    color: #e94560;
  }
  #main-canvas {
    max-width: 100vw;
    max-height: 70vh;
    border: 2px solid #e94560;
    border-radius: 8px;
  }
  #controls {
    display: flex;
    gap: 12px;
    padding: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #e94560;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.2s;
  }
  button:active { background: #c73652; }
  #painting-name {
    font-size: 1.1rem;
    padding: 4px 12px;
    text-align: center;
    color: #ffd460;
  }
  #status {
    font-size: 0.85rem;
    color: #aaa;
    padding: 4px 12px;
    text-align: center;
  }
  #video-hidden { display: none; }
</style>
</head>
<body>

<h1>🎨 名畫嘴巴合成器</h1>
<div id="painting-name">蒙娜麗莎</div>
<canvas id="main-canvas"></canvas>
<div id="status">🔄 載入中...</div>

<div id="controls">
  <button onclick="prevPainting()">⬅️ 上一張</button>
  <button onclick="nextPainting()">下一張 ➡️</button>
  <button onclick="saveScreenshot()">📸 截圖</button>
</div>

<video id="video-hidden" autoplay playsinline muted></video>
<video id="video-preview" autoplay playsinline muted style="width:100px;height:80px;border-radius:8px;border:2px solid #e94560;display:none;position:fixed;bottom:80px;right:10px;object-fit:cover;z-index:100;"></video>

<script>
// ── 名畫設定（嘴巴位置需根據圖片手動調整）──
const PAINTINGS = [
  {
    name: "蒙娜麗莎",
    file: "paintings/mona_lisa.jpg",
    // mouth 位置 (x, y, w, h) 以名畫原始尺寸為基準
    // mona_lisa.jpg: 800x1192
    mouth: { x: 270, y: 615, w: 190, h: 70 }
  },
  {
    name: "戴珍珠耳環的少女",
    file: "paintings/girl_pearl.jpg",
    // girl_pearl.jpg: 800x947
    mouth: { x: 310, y: 620, w: 190, h: 70 }
  }
];

let currentIdx = 0;
let paintingImgs = [];
let videoEl = document.getElementById('video-hidden');
let canvas = document.getElementById('main-canvas');
let ctx = canvas.getContext('2d');
let faceApiLoaded = false;
let animFrame = null;

// ── 載入 face-api.js（用 CDN）──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    let s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function init() {
  // 載入名畫
  setStatus("🎨 載入名畫...");
  for (let p of PAINTINGS) {
    let img = new Image();
    img.crossOrigin = "anonymous";
    await new Promise((res) => {
      img.onload = res;
      img.onerror = res; // 失敗也繼續
      img.src = p.file;
    });
    paintingImgs.push(img);
  }
  
  setStatus("📷 請允許相機存取...");
  
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: 640, height: 480 } 
    });
    videoEl.srcObject = stream;
    await new Promise(r => { videoEl.onloadedmetadata = r; });
    videoEl.play();
    // 顯示小預覽確認鏡頭有開
    const preview = document.getElementById('video-preview');
    preview.srcObject = stream;
    preview.style.display = 'block';
    setStatus("😊 把臉對準鏡頭！換名畫用按鈕");
    
    // 載入 face-api.js（相機開好後才載）
    try {
      await loadScript('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js');
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights')
      ]);
      faceApiLoaded = true;
      setStatus("✅ 準備好了！把嘴巴對準鏡頭");
    } catch(e) {
      setStatus("😊 相機已開啟（簡化模式，嘴巴偵測需要稍等）");
    }
    
    startLoop();
  } catch(e) {
    setStatus("❌ 請允許相機存取後重新整理頁面");
    // 顯示一個提示按鈕
    document.getElementById('controls').innerHTML = 
      '<button onclick="location.reload()">🔄 重新整理並允許相機</button>' +
      document.getElementById('controls').innerHTML;
  }
}

// ── 主迴圈 ──
let lastFaceLandmarks = null;
let frameCount = 0;

// 用 Canvas 自製人臉偵測（不依賴 face-api）
// 從鏡頭中央裁取「嘴巴區域」（鏡頭下半部中間）
function getMouthRegionFromVideo() {
  const vw = videoEl.videoWidth;
  const vh = videoEl.videoHeight;
  if (!vw || !vh) return null;
  
  // 假設臉在畫面中央，嘴巴在臉的下半部
  // 取畫面中央 40% 寬、下方 25-45% 高的區域
  const sx = vw * 0.25;
  const sy = vh * 0.55;  // 嘴巴約在鏡頭畫面的 55-75% 高度
  const sw = vw * 0.50;
  const sh = vh * 0.20;
  return { sx, sy, sw, sh };
}

async function startLoop() {
  const loop = async () => {
    drawFrame();
    
    // 如果 face-api 載好了，用精確偵測
    if (frameCount % 4 === 0 && faceApiLoaded) {
      try {
        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 });
        const result = await faceapi.detectSingleFace(videoEl, options).withFaceLandmarks(true);
        if (result) {
          lastFaceLandmarks = result.landmarks;
        }
      } catch(e) {}
    }
    
    frameCount++;
    animFrame = requestAnimationFrame(loop);
  };
  loop();
}

function drawFrame() {
  const painting = PAINTINGS[currentIdx];
  const paintImg = paintingImgs[currentIdx];
  if (!paintImg) return;
  
  // 設定 canvas 大小
  const maxH = Math.min(window.innerHeight * 0.62, 600);
  const scale = maxH / paintImg.height;
  canvas.width = paintImg.width * scale;
  canvas.height = paintImg.height * scale;
  
  // 畫名畫
  ctx.drawImage(paintImg, 0, 0, canvas.width, canvas.height);
  
  if (videoEl.readyState < 2) return;
  
  const m = painting.mouth;
  const tx = m.x * scale;
  const ty = m.y * scale;
  const tw = m.w * scale;
  const th = m.h * scale;
  
  let sx, sy, sw, sh;
  
  if (lastFaceLandmarks) {
    // 精確模式：用 face-api 偵測到的嘴巴 landmark
    const mouthPts = lastFaceLandmarks.getMouth();
    const vw = videoEl.videoWidth;
    const vh = videoEl.videoHeight;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let pt of mouthPts) {
      minX = Math.min(minX, pt.x);
      maxX = Math.max(maxX, pt.x);
      minY = Math.min(minY, pt.y);
      maxY = Math.max(maxY, pt.y);
    }
    const padX = (maxX - minX) * 0.3;
    const padY = (maxY - minY) * 0.4;
    sx = Math.max(0, minX - padX);
    sy = Math.max(0, minY - padY);
    sw = Math.min(vw - sx, (maxX - minX) + padX * 2);
    sh = Math.min(vh - sy, (maxY - minY) + padY * 2);
  } else {
    // 簡化模式：直接抓鏡頭中央下方區域當嘴巴
    const r = getMouthRegionFromVideo();
    if (!r) return;
    ({ sx, sy, sw, sh } = r);
  }
  
  // 羽化橢圓形貼上
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(tx + tw/2, ty + th/2, tw/2 * 1.05, th/2 * 1.15, 0, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(videoEl, sx, sy, sw, sh, tx - tw*0.02, ty - th*0.08, tw*1.04, th*1.16);
  ctx.restore();
}

function nextPainting() {
  currentIdx = (currentIdx + 1) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
}

function prevPainting() {
  currentIdx = (currentIdx - 1 + PAINTINGS.length) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
}

function saveScreenshot() {
  const link = document.createElement('a');
  link.download = `facemash_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// 鍵盤快捷鍵
document.addEventListener('keydown', e => {
  if (e.key === 'n' || e.key === 'N') nextPainting();
  if (e.key === 'p' || e.key === 'P') prevPainting();
  if (e.key === 's' || e.key === 'S') saveScreenshot();
});

init();
</script>
</body>
</html>
