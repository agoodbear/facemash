<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名畫嘴巴合成器 🎨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    color: white;
    overflow-y: auto;
  }
  h1 { padding: 8px; font-size: 1.1rem; color: #e94560; }
  #painting-name { font-size: 1rem; color: #ffd460; padding: 2px 8px; }
  #canvas-wrap {
    position: relative;
    touch-action: none;
  }
  #main-canvas {
    display: block;
    max-width: 100vw;
    border: 2px solid #e94560;
    border-radius: 8px;
  }
  /* 可拖動的嘴巴框 */
  #mouth-box {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    touch-action: none;
    transform-origin: center center;
  }
  #mouth-box.edit-mode {
    border: 3px dashed #00ff88;
    cursor: move;
    box-shadow: 0 0 10px rgba(0,255,136,0.5);
  }
  /* 縮放把手（右下角） */
  #resize-handle {
    position: absolute;
    width: 22px;
    height: 22px;
    background: #00ff88;
    border-radius: 50%;
    bottom: -11px;
    right: -11px;
    cursor: se-resize;
    touch-action: none;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  /* 旋轉把手（左下角） */
  #rotate-handle {
    position: absolute;
    width: 22px;
    height: 22px;
    background: #ff6b35;
    border-radius: 50%;
    bottom: -11px;
    left: -11px;
    cursor: grab;
    touch-action: none;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    user-select: none;
  }
  #rotate-handle:active { cursor: grabbing; }
  #mouth-box.edit-mode #resize-handle,
  #mouth-box.edit-mode #rotate-handle {
    display: flex;
  }
  #controls {
    display: flex;
    gap: 8px;
    padding: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #e94560;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:active { background: #c73652; }
  .btn-green { background: #00aa55; }
  .btn-green:active { background: #008844; }
  #status { font-size: 0.8rem; color: #aaa; padding: 2px 8px; text-align: center; }
  #video-hidden { display: none; }
  #video-preview {
    width: 80px; height: 65px;
    border-radius: 8px;
    border: 2px solid #e94560;
    position: fixed;
    bottom: 70px; right: 8px;
    object-fit: cover;
    z-index: 100;
  }
  #coords-display {
    font-size: 0.75rem;
    color: #888;
    padding: 2px 8px;
    font-family: monospace;
  }
</style>
</head>
<body>

<h1>🎨 名畫嘴巴合成器</h1>
<div id="painting-name">蒙娜麗莎</div>
<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
  <div id="mouth-box">
    <div id="rotate-handle">✕</div>
    <div id="resize-handle">⤡</div>
  </div>
</div>
<div id="status">載入中...</div>
<div id="coords-display">x:305 y:365 w:120 h:45 °0</div>

<div id="controls">
  <button onclick="prevPainting()">⬅️</button>
  <button onclick="nextPainting()">➡️ 換畫</button>
  <button class="btn-green" onclick="saveScreenshot()">📸 截圖</button>
  <button onclick="resetMouth()">🔄 重置</button>
</div>

<video id="video-hidden" autoplay playsinline muted></video>
<video id="video-preview" autoplay playsinline muted></video>

<script>
const PAINTINGS = [
  { name: "蒙娜麗莎",             file: "paintings/mona_lisa.jpg",    mouth: { x: 305, y: 365, w: 120, h: 45, angle: 0 } },
  { name: "戴珍珠耳環的少女",      file: "paintings/girl_pearl.jpg",   mouth: { x: 310, y: 620, w: 130, h: 50, angle: 0 } },
  { name: "倒牛奶的女僕（維梅爾）", file: "paintings/milkmaid.jpg",     mouth: { x: 310, y: 450, w: 130, h: 50, angle: 0 } },
  { name: "林布蘭自畫像",          file: "paintings/rembrandt.jpg",    mouth: { x: 310, y: 580, w: 130, h: 50, angle: 0 } },
  { name: "阿波羅貝爾維德雷",       file: "paintings/apollo.jpg",       mouth: { x: 255, y: 168, w: 65,  h: 25, angle: 0 } },
  { name: "抱銀貂的女人（達文西）", file: "paintings/ermine_lady.jpg",  mouth: { x: 285, y: 355, w: 75,  h: 30, angle: 0 } },
  { name: "岩窟聖母（達文西）",     file: "paintings/madonna.jpg",      mouth: { x: 285, y: 383, w: 55,  h: 22, angle: 0 } },
  { name: "著衣的瑪哈（哥雅）",     file: "paintings/maja.jpg",         mouth: { x: 449, y: 106, w: 28,  h: 14, angle: 0 } },
  { name: "伊斯沃斯蒙娜麗莎",       file: "paintings/mona2.jpg",        mouth: { x: 295, y: 345, w: 80,  h: 30, angle: 0 } },
  { name: "戴紅帽的少女（維梅爾）", file: "paintings/red_hat_girl.jpg", mouth: { x: 265, y: 408, w: 70,  h: 28, angle: 0 } },
  { name: "維納斯的誕生（波提切利）",file: "paintings/venus.jpg",        mouth: { x: 308, y: 122, w: 25,  h: 14, angle: 0 } }
];

// 備份原始嘴巴座標（用於重置）
const MOUTH_DEFAULTS = PAINTINGS.map(p => ({ ...p.mouth }));

let currentIdx = 0;
let paintingImgs = [];
let videoEl = document.getElementById('video-hidden');
let canvas = document.getElementById('main-canvas');
let ctx = canvas.getContext('2d');
let faceApiLoaded = false;
let lastFaceLandmarks = null;
let frameCount = 0;
let paintScale = 1;

// ── 嘴巴框狀態 ──
let mouthBox = document.getElementById('mouth-box');
let resizeHandle = document.getElementById('resize-handle');
let rotateHandle = document.getElementById('rotate-handle');
let isDragging = false, isResizing = false, isRotating = false, isEditMode = false;
let dragStartX, dragStartY, boxStartLeft, boxStartTop;
let resizeStartX, resizeStartY, boxStartW, boxStartH;
let rotateStartAngle = 0, rotateStartPointerAngle = 0;
let currentAngle = 0; // degrees

// ── 取嘴巴框目前的螢幕座標 ──
function getBoxScreen() {
  return {
    left: parseInt(mouthBox.style.left) || 0,
    top:  parseInt(mouthBox.style.top)  || 0,
    w:    parseInt(mouthBox.style.width)  || 120,
    h:    parseInt(mouthBox.style.height) || 45
  };
}

// ── 把顯示座標轉回原始圖片座標 ──
function getOrigCoords() {
  const { left, top, w, h } = getBoxScreen();
  return {
    x: Math.round(left / paintScale),
    y: Math.round(top  / paintScale),
    w: Math.round(w    / paintScale),
    h: Math.round(h    / paintScale),
    angle: Math.round(currentAngle)
  };
}

function updateCoordsDisplay() {
  const c = getOrigCoords();
  document.getElementById('coords-display').textContent =
    `x:${c.x} y:${c.y} w:${c.w} h:${c.h} °${c.angle}`;
  PAINTINGS[currentIdx].mouth = c;
}

function applyTransform() {
  mouthBox.style.transform = `rotate(${currentAngle}deg)`;
}

// ── 進出編輯模式 ──
let tapStartX, tapStartY, tapMoved = false;
let lastTapTime = 0;

function enterEditMode() {
  isEditMode = true;
  mouthBox.classList.add('edit-mode');
  setStatus("✏️ 拖動調位置｜右下角●縮放｜左下角✕旋轉｜雙擊退出");
}

function exitEditMode() {
  isEditMode = false;
  mouthBox.classList.remove('edit-mode');
  setStatus("✅ 完成！點嘴巴位置可再次調整");
}

// ── 拖動本體 ──
function onDragStart(e) {
  if (!isEditMode) return;
  isDragging = true;
  tapMoved = false;
  const t = e.touches ? e.touches[0] : e;
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  ({ left: boxStartLeft, top: boxStartTop } = getBoxScreen());
  e.preventDefault();
}

function onDragMove(e) {
  if (!isDragging) return;
  const t = e.touches ? e.touches[0] : e;
  const dx = t.clientX - dragStartX;
  const dy = t.clientY - dragStartY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) tapMoved = true;
  mouthBox.style.left = (boxStartLeft + dx) + 'px';
  mouthBox.style.top  = (boxStartTop  + dy) + 'px';
  updateCoordsDisplay();
  e.preventDefault();
}

function onDragEnd() { isDragging = false; }

// ── 縮放把手（右下角） ──
function onResizeStart(e) {
  if (!isEditMode) return;
  isResizing = true;
  const t = e.touches ? e.touches[0] : e;
  resizeStartX = t.clientX;
  resizeStartY = t.clientY;
  ({ w: boxStartW, h: boxStartH } = getBoxScreen());
  e.preventDefault();
  e.stopPropagation();
}

function onResizeMove(e) {
  if (!isResizing) return;
  const t = e.touches ? e.touches[0] : e;
  const newW = Math.max(20, boxStartW + (t.clientX - resizeStartX));
  const newH = Math.max(10, boxStartH + (t.clientY - resizeStartY));
  mouthBox.style.width  = newW + 'px';
  mouthBox.style.height = newH + 'px';
  updateCoordsDisplay();
  e.preventDefault();
}

function onResizeEnd() { isResizing = false; }

// ── 旋轉把手（左下角） ──
function getBoxCenter() {
  const wrap = document.getElementById('canvas-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const { left, top, w, h } = getBoxScreen();
  return {
    cx: wrapRect.left + left + w / 2,
    cy: wrapRect.top  + top  + h / 2
  };
}

function onRotateStart(e) {
  if (!isEditMode) return;
  isRotating = true;
  const t = e.touches ? e.touches[0] : e;
  const { cx, cy } = getBoxCenter();
  rotateStartPointerAngle = Math.atan2(t.clientY - cy, t.clientX - cx) * 180 / Math.PI;
  rotateStartAngle = currentAngle;
  e.preventDefault();
  e.stopPropagation();
}

function onRotateMove(e) {
  if (!isRotating) return;
  const t = e.touches ? e.touches[0] : e;
  const { cx, cy } = getBoxCenter();
  const pointerAngle = Math.atan2(t.clientY - cy, t.clientX - cx) * 180 / Math.PI;
  currentAngle = rotateStartAngle + (pointerAngle - rotateStartPointerAngle);
  applyTransform();
  updateCoordsDisplay();
  e.preventDefault();
}

function onRotateEnd() { isRotating = false; }

// ── 觸控點擊邏輯（touchstart/touchend 自己管）──
mouthBox.addEventListener('touchstart', (e) => {
  if (e.target === resizeHandle || e.target === rotateHandle) return;
  tapStartX = e.touches[0].clientX;
  tapStartY = e.touches[0].clientY;
  tapMoved = false;
  if (isEditMode) onDragStart(e);
}, { passive: false });

mouthBox.addEventListener('touchend', (e) => {
  if (e.target === resizeHandle || e.target === rotateHandle) return;
  onDragEnd();
  if (tapMoved) return;
  const now = Date.now();
  const gap = now - lastTapTime;
  lastTapTime = now;
  if (!isEditMode) { enterEditMode(); }
  else if (gap < 400) { exitEditMode(); }
  e.preventDefault();
}, { passive: false });

// ── 滑鼠版 ──
mouthBox.addEventListener('mousedown', (e) => {
  if (e.target === resizeHandle || e.target === rotateHandle) return;
  tapMoved = false;
  if (isEditMode) onDragStart(e);
});
mouthBox.addEventListener('click', (e) => {
  if (e.target === resizeHandle || e.target === rotateHandle) return;
  if (tapMoved) return;
  if (!isEditMode) enterEditMode();
});
mouthBox.addEventListener('dblclick', (e) => {
  if (isEditMode) exitEditMode();
});

// ── 綁定把手事件 ──
resizeHandle.addEventListener('mousedown',  onResizeStart);
resizeHandle.addEventListener('touchstart', onResizeStart, { passive: false });
rotateHandle.addEventListener('mousedown',  onRotateStart);
rotateHandle.addEventListener('touchstart', onRotateStart, { passive: false });

// ── 全域移動 / 放開 ──
document.addEventListener('mousemove', (e) => { onDragMove(e); onResizeMove(e); onRotateMove(e); });
document.addEventListener('touchmove', (e) => { onDragMove(e); onResizeMove(e); onRotateMove(e); }, { passive: false });
document.addEventListener('mouseup',  () => { onDragEnd(); onResizeEnd(); onRotateEnd(); });
document.addEventListener('touchend', () => { onDragEnd(); onResizeEnd(); onRotateEnd(); });

// ── 更新嘴巴框位置 ──
function positionMouthBox() {
  const m = PAINTINGS[currentIdx].mouth;
  mouthBox.style.left   = Math.round(m.x * paintScale) + 'px';
  mouthBox.style.top    = Math.round(m.y * paintScale) + 'px';
  mouthBox.style.width  = Math.round(m.w * paintScale) + 'px';
  mouthBox.style.height = Math.round(m.h * paintScale) + 'px';
  currentAngle = m.angle || 0;
  applyTransform();
  updateCoordsDisplay();
}

function resetMouth() {
  PAINTINGS[currentIdx].mouth = { ...MOUTH_DEFAULTS[currentIdx] };
  positionMouthBox();
}

// ── 載入腳本 ──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    let s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function init() {
  setStatus("🎨 載入名畫...");
  for (let p of PAINTINGS) {
    let img = new Image();
    img.crossOrigin = "anonymous";
    await new Promise((res) => { img.onload = res; img.onerror = res; img.src = p.file; });
    paintingImgs.push(img);
  }

  setStatus("📷 請允許相機...");
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    videoEl.srcObject = stream;
    document.getElementById('video-preview').srcObject = stream;
    await new Promise(r => { videoEl.onloadedmetadata = r; });
    videoEl.play();
    setStatus("✅ 拖動綠色框調整嘴巴位置！");

    loadScript('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js').then(async () => {
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights'),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights')
      ]);
      faceApiLoaded = true;
      setStatus("🎯 精確模式啟動！拖動綠框調位置");
    }).catch(() => {});

    startLoop();
  } catch(e) {
    setStatus("❌ 請允許相機存取後重新整理");
  }
}

function getMouthRegionFromVideo() {
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if (!vw || !vh) return null;
  return { sx: vw*0.25, sy: vh*0.55, sw: vw*0.50, sh: vh*0.20 };
}

async function startLoop() {
  const loop = async () => {
    drawFrame();
    if (frameCount % 4 === 0 && faceApiLoaded) {
      try {
        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 });
        const result = await faceapi.detectSingleFace(videoEl, options).withFaceLandmarks(true);
        if (result) lastFaceLandmarks = result.landmarks;
      } catch(e) {}
    }
    frameCount++;
    requestAnimationFrame(loop);
  };
  loop();
}

function drawFrame() {
  const paintImg = paintingImgs[currentIdx];
  if (!paintImg) return;

  const maxH = Math.min(window.innerHeight * 0.70, 750);
  paintScale = maxH / paintImg.height;
  canvas.width  = Math.round(paintImg.width  * paintScale);
  canvas.height = Math.round(paintImg.height * paintScale);

  ctx.drawImage(paintImg, 0, 0, canvas.width, canvas.height);

  if (videoEl.readyState < 2) return;

  // 嘴巴框位置（螢幕座標，可能被拖動）
  const boxLeft = parseInt(mouthBox.style.left) || Math.round(PAINTINGS[currentIdx].mouth.x * paintScale);
  const boxTop  = parseInt(mouthBox.style.top)  || Math.round(PAINTINGS[currentIdx].mouth.y * paintScale);
  const boxW    = parseInt(mouthBox.style.width)  || Math.round(PAINTINGS[currentIdx].mouth.w * paintScale);
  const boxH    = parseInt(mouthBox.style.height) || Math.round(PAINTINGS[currentIdx].mouth.h * paintScale);
  const cx = boxLeft + boxW / 2;
  const cy = boxTop  + boxH / 2;
  const angleRad = currentAngle * Math.PI / 180;

  let sx, sy, sw, sh;
  if (lastFaceLandmarks) {
    const mouthPts = lastFaceLandmarks.getMouth();
    const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    for (let pt of mouthPts) { minX=Math.min(minX,pt.x); maxX=Math.max(maxX,pt.x); minY=Math.min(minY,pt.y); maxY=Math.max(maxY,pt.y); }
    const padX=(maxX-minX)*0.3, padY=(maxY-minY)*0.4;
    sx=Math.max(0,minX-padX); sy=Math.max(0,minY-padY);
    sw=Math.min(vw-sx,(maxX-minX)+padX*2); sh=Math.min(vh-sy,(maxY-minY)+padY*2);
  } else {
    const r = getMouthRegionFromVideo();
    if (!r) return;
    ({ sx, sy, sw, sh } = r);
  }

  // 以框中心旋轉後貼上嘴巴
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleRad);
  ctx.beginPath();
  ctx.ellipse(0, 0, boxW/2*1.05, boxH/2*1.15, 0, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(videoEl, sx, sy, sw, sh,
    -boxW/2 - boxW*0.02, -boxH/2 - boxH*0.08,
    boxW*1.04, boxH*1.16);
  ctx.restore();

  // 保持綠框位置同步（非操作時）
  if (!isDragging && !isResizing && !isRotating) {
    positionMouthBox();
  }
}

function nextPainting() {
  currentIdx = (currentIdx + 1) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
  positionMouthBox();
}

function prevPainting() {
  currentIdx = (currentIdx - 1 + PAINTINGS.length) % PAINTINGS.length;
  document.getElementById('painting-name').textContent = PAINTINGS[currentIdx].name;
  positionMouthBox();
}

function saveScreenshot() {
  mouthBox.style.display = 'none';
  const link = document.createElement('a');
  link.download = `facemash_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  setTimeout(() => mouthBox.style.display = '', 100);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

init();
</script>
</body>
</html>
